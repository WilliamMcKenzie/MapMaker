<html>
    <head>
        <title>Mapmaker</title>
        <link rel="stylesheet" href="https://use.typekit.net/jbe5uxg.css">
        <style>
            .tools {
                position: absolute;
                background-image: url('/assets/ui/background.png');
				background-size: cover;
				image-rendering: pixelated;

				top: 1rem;
				left: 1rem;
				
				display: flex;
				padding: 0.25rem;
				border-image: url('/assets/ui/border.png') 9 / 9px / 0 round;
				border-width: 12px;
				border-style: solid;
            }
            .tool {
                background: transparent;
                padding: 0;
                margin: 16px;
                width: 9px;
                height: 9px;
                scale: 4;
                image-rendering: pixelated;
                border: 0;
                filter:
					drop-shadow(0.5px 0 0.5px #00000083)
					drop-shadow(-0.5px 0 0.5px #00000083)
					drop-shadow(0 0.5px 0.5px #00000083)
					drop-shadow(0 -0.5px 0.5px #00000083);
            }
            .tool:hover {
                outline: 0.5px solid #ffffff;
            }
            .selected_tool {
                outline: 1px solid #ffffff !important;
            }

            .selection {
                position: absolute;
                background-image: url('/assets/ui/background.png');
				background-size: cover;
				image-rendering: pixelated;

				bottom: 1rem;
				left: 50%;
				transform: translate(-50%, 0);
				
				display: flex;
				box-sizing: content-box;
				justify-content: center;
				padding: 0.25rem;
				border-image: url('/assets/ui/border.png') 9 / 9px / 0 round;
				border-width: 12px;
				border-style: solid;
            }
            .icon {
                background: transparent;
                background-image: url('/assets/tiles/tiles.png');
                background-repeat: no-repeat;
                background-size: 256px 256px;
                padding: 0;
                margin: 16px;
                width: 8px;
                height: 8px;
                scale: 4;
                image-rendering: pixelated;
                border: 0;
                filter:
					drop-shadow(0.5px 0 0.5px #00000083)
					drop-shadow(-0.5px 0 0.5px #00000083)
					drop-shadow(0 0.5px 0.5px #00000083)
					drop-shadow(0 -0.5px 0.5px #00000083);
            }
            .icon:hover {
                outline: 0.5px solid #ffffff;
            }
            .selected {
                outline: 1px solid #ffffff !important;
            }

            .buttons {
                position: absolute;
                top: 1rem;
                right: 1rem;
                display: flex;
                flex-direction: column;
            }
            .buttons button {
                background-color: #636363;
				background-size: cover;
				image-rendering: pixelated;
				border-image: url('/assets/ui/border.png') 9 / 9px / 0 round;
				border-width: 12px;
				border-style: solid;

                padding: 0.5rem;
                margin-bottom: 0.5rem;

                color: rgb(211, 211, 211);
                font-family: "myriad-pro", sans-serif;
                font-weight: 0;
            }
            .buttons button:hover {
                background-color: #747474;
            }
        </style>
    </head>
    <body style="margin: 0;">
        <table class="tools">
            <tr>
                <td>
                    <button onclick="select_tool('brush_1', this)" class="tool selected_tool" style="background-image: url(/assets/ui/brush_1.png);"></button>
                </td>
            </tr>
             <tr>
                <td>
                    <button onclick="select_tool('brush_2', this)" class="tool" style="background-image: url(/assets/ui/brush_2.png);"></button>
                </td>
            </tr>
             <tr>
                <td>
                    <button onclick="select_tool('brush_3', this)" class="tool" style="background-image: url(/assets/ui/brush_3.png);"></button>
                </td>
            </tr>
            <tr>
                <td>
                    <button onclick="select_tool('move', this)" class="tool" style="background-image: url(/assets/ui/move.png);"></button>
                </td>
            </tr>
        </table>
        <table class="selection">
            <tr>
                <td>
                    <button onclick="select('water', this)" class="icon selected" style="background-position: 0px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('grass', this)" class="icon" style="background-position: -24px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('wood', this)" class="icon" style="background-position: -64px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('floor', this)" class="icon" style="background-position: -88px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('dry_grass', this)" class="icon" style="background-position: -128px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('sand', this)" class="icon" style="background-position: -168px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('sandstone', this)" class="icon" style="background-position: -192px 0px;"></button>
                </td>
                <td>
                    <button onclick="select('cold_grass', this)" class="icon" style="background-position: 0px -40px;"></button>
                </td>
                <td>
                    <button onclick="select('snow', this)" class="icon" style="background-position: -40px -40px;"></button>
                </td>
                <td>
                    <button onclick="select('ice', this)" class="icon" style="background-position: -64px -40px;"></button>
                </td>
                <td>
                    <button onclick="select('gravel', this)" class="icon" style="background-position: -96px -40px;"></button>
                </td>
                <td>
                    <button onclick="select('ruin', this)" class="icon" style="background-position: -120px -40px;"></button>
                </td>
                <td>
                    <button onclick="select('lava', this)" class="icon" style="background-position: -160px -40px;"></button>
                </td>
            </tr>
        </table>
        <div class="buttons">
            <button onclick="makemap(1)">
                Map 1
            </button>
            <button onclick="makemap(2)">
                Map 2
            </button>
            <button onclick="makemap(3)">
                Map 3
            </button>
            <button onclick="makemap(4)">
                Map 4
            </button>
            <button onclick="makemap(0)">
                Reset
            </button>
        </div>

        <script src="/scripts/pixi.js"></script>
        <script src="/scripts/filters.js"></script>
        <script src="/scripts/main.js"></script>
        <script src="/scripts/tiles.js"></script>
        <script src="/scripts/objects.js"></script>
        <script src="/scripts/draw.js"></script>
        <script src="/scripts/generator.js"></script>
        <script>
            let selected_tool = 'brush_1'
            function select_tool(tool, element) {
                selected_tool = tool
                document.querySelector(".selected_tool").classList.remove("selected_tool")
                element.classList.add("selected_tool")
            }

            let selected_tile = 'water'
            function select(tile, element) {
                selected_tile = tile
                document.querySelector(".selected").classList.remove("selected")
                element.classList.add("selected")
            }
            init()

            async function makemap(which) {
                if (which) {
                    let map = await (await fetch(`http://127.0.0.1:7778/get_map_${which}`)).json()
                    populate_map(map)
                }
                else {
                    for (let tile of Object.values(tile_map)) {
                        tile.mesh.destroy()
                    }
                    tile_map = {}
                }
            }
        </script>
    </body>
</html>
